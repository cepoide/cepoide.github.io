<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin de Proyectos - Invad3r</title>
    <link rel="stylesheet" href="style.css" />
    
    <script src="https://cdn.tiny.cloud/1/z02wm9cmyhv75ejxmfjm37ow5v4zkhtzelndpv8cdldnc56s/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>

    <style>
        /* Estilos específicos para el panel de admin (sin cambios) */
        main { max-width: 900px; margin: 20px auto; }
        .editor-proyecto-item {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        body.oscuro .editor-proyecto-item {
            background-color: #4a4a4a;
            border-color: #5a5a5a;
        }
        .editor-proyecto-item label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
        .editor-proyecto-item input,
        .editor-proyecto-item textarea,
        .editor-proyecto-item select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }
        body.oscuro .editor-proyecto-item input,
        body.oscuro .editor-proyecto-item textarea,
        body.oscuro .editor-proyecto-item select {
            background-color: #555;
            border-color: #666;
            color: #fff;
        }
        .editor-proyecto-item .controles-item {
            text-align: right;
        }
        #controles-globales {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 20px;
            background-color: #f0f0f0;
            border-radius: 8px;
        }
        body.oscuro #controles-globales {
            background-color: #333;
        }
        #login-button, #add-project-button, #save-button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
        }
        #login-button { background-color: #24292e; }
        #add-project-button { background-color: #28a745; }
        #save-button { background-color: #007bff; }
    </style>
</head>
<body>

<nav id="main-navbar">
    <div class="logo">
        <a href="index.html" style="text-decoration:none; color:inherit;">
             <svg id="uuid-807e765c-967d-4209-9915-76090e8b272a" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 126.969 60.388"><g id="letras-negras"><path d="M9.39,15.057c-.565...etc"/></g><path d="M126.969,0c-1.961...etc" fill="#69b432"/></svg>
        </a>
    </div>
    <div class="controles-nav">
        <h1>Panel de Administración</h1>
    </div>
</nav>

<main>
    <div id="login-container">
        <p>Debes iniciar sesión con GitHub para editar los proyectos.</p>
        <button id="login-button">Iniciar Sesión con GitHub</button>
    </div>

    <div id="editor-container" style="display: none;">
        <h2>Editando <code>proyectos.json</code></h2>
        <div id="proyectos-editor-list">
            </div>
        <div id="controles-globales">
            <button id="add-project-button">Añadir Nuevo Proyecto</button>
            <div>
                <span id="status" style="margin-right: 20px;"></span>
                <button id="save-button">Guardar Todos los Cambios en GitHub</button>
            </div>
        </div>
    </div>
</main>

<script src="admin.js"></script>

</body>
</html>
