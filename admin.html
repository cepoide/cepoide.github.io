<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel de Administración (Modo Depuración)</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        main { max-width: 600px; margin: 40px auto; padding: 40px; text-align: center; }
        textarea { width: 100%; min-height: 100px; margin: 20px 0; padding: 10px; font-family: monospace; }
        button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; background-color: #28a745; }
    </style>
</head>
<body>
    <main>
        <h1>Configurar Token de Acceso</h1>
        <p>Pega tu Token de Acceso Personal de GitHub y haz clic en guardar.</p>
        <textarea id="token-input" placeholder="Pega tu token aquí..."></textarea>
        <button id="save-token-button">Guardar Token y Entrar</button>
        <p id="status" style="color: green;"></p>
    </main>
    <script>
        document.getElementById('save-token-button').addEventListener('click', () => {
            // Alerta 1: Para confirmar que el botón funciona.
            alert("Botón presionado. Verificando el token...");

            const tokenInput = document.getElementById('token-input');
            const token = tokenInput.value.trim();

            // Alerta 2: Nos mostrará el token exacto que leyó el script.
            alert("El token que leí es: '" + token + "'");

            // Condición de validación
            if (token && (token.startsWith('ghp_') || token.startsWith('github_pat_'))) {
                // Alerta 3: Si la validación es exitosa, veremos este mensaje.
                alert("El formato del token es CORRECTO. Guardando y redirigiendo...");

                localStorage.setItem('github_token', token);
                document.getElementById('status').textContent = '¡Token guardado! Redirigiendo...';
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                // Alerta 4: Si la validación falla, veremos este mensaje.
                alert("El formato del token es INCORRECTO. Revisa la consola (F12) para más detalles y asegúrate de que el token pegado sea el correcto.");
                console.log("El token ingresado no pasó la validación. Valor recibido:", token);
            }
        });
    </script>
</body>
</html>
