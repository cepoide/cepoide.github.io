# Backend: Configuración para conectar con tu repositorio de GitHub
backend:
  name: github
  repo: cepoide/cepoide.github.io  # Revisa que sea tu usuario y nombre de repo correctos
  branch: main                    # O 'master' si tu rama principal tiene ese nombre

# Media: Configuración para las imágenes que subas desde el panel
media_folder: "img"               # Las imágenes se guardarán en la carpeta "img"
public_folder: "/img"             # Cómo se accederá a las imágenes desde el sitio

# Collections: Define el contenido que se puede editar
collections:
  - name: "proyectos"             # Un nombre interno para esta colección de contenido
    label: "Proyectos"              # El nombre que verás en el panel de administración
    label_singular: "Proyecto"      # El nombre para un solo elemento (ej: "Añadir nuevo Proyecto")
    file: "proyectos.json"          # Le indicamos que todos los datos se guardan en este único archivo
    widget: "list"                  # ¡Importante! Le decimos que el archivo es una LISTA de elementos
    add_to_top: true                # Los nuevos proyectos aparecerán al principio de la lista
    fields:                         # Aquí se definen los campos para CADA proyecto en la lista
      - {label: "Título", name: "titulo", widget: "string"}
      - {label: "Descripción", name: "descripcion", widget: "markdown"}
      - {label: "URL de la Imagen", name: "imagenUrl", widget: "image"}
      - {label: "Texto Alternativo (Alt)", name: "altImagen", widget: "string", optional: true}
      - {label: "URL del Proyecto", name: "enlaceUrl", widget: "string"}
      - {label: "Categoría", name: "categoria", widget: "select", options: ["Facultad", "Personal"]}
