# Backend: Configuración para conectar con tu repositorio de GitHub
backend:
  name: github
  repo: cepoide/cepoide.github.io
  branch: main
  auth_type: implicit
  app_id: TU_CLIENT_ID_DE_GITHUB # ¡No olvides pegar tu Client ID aquí!

# Media: Configuración para las imágenes
media_folder: "img"
public_folder: "/img"

# Collections: Define el contenido editable
collections:
  - name: "proyectos"        # Nombre interno de la colección
    label: "Proyectos"       # Nombre que verás en la barra lateral
    files:                   # Usamos la propiedad 'files' que pedía el error
      - name: "lista_proyectos"  # Un nombre interno para este grupo de datos
        label: "Lista de Proyectos" # El título que verás en la página principal del panel
        file: "proyectos.json"      # El archivo que contiene la lista
        create: true                # Permitir añadir nuevos proyectos a la lista
        fields:                     # Los campos para CADA ÍTEM de la lista
          - {label: "Título", name: "titulo", widget: "string"}
          - {label: "Descripción", name: "descripcion", widget: "markdown"}
          - {label: "URL de la Imagen", name: "imagenUrl", widget: "image"}
          - {label: "Texto Alternativo (Alt)", name: "altImagen", widget: "string", optional: true}
          - {label: "URL del Proyecto", name: "enlaceUrl", widget: "string"}
          - {label: "Categoría", name: "categoria", widget: "select", options: ["Facultad", "Personal"]}
